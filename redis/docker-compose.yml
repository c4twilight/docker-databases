# docker compose file for redis and redis-insight with port mapping


services:
  redis:
    image: redis:7.4
    container_name: redis
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis-volume-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  redisinsight:
    image: redis/redisinsight:2.60
    container_name: redisinsight
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - 8001:8001
    volumes:
      - redisinsight-data:/db

volumes:
  redis-volume-data:
  redisinsight-data:
